services:
  db:
    image: postgres:17.6
    ports:
      - "5433:5432"
    volumes:
      - postgres_db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=blt_db
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "blt_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: secguard-db
    restart: always

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    container_name: secguard-backend
    restart: on-failure
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/website:/blt/website:cached
      - ./backend/blt:/blt/blt:cached
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/blt_db
      - POSTGRES_PASSWORD=postgres
    command: poetry run python manage.py runserver 0.0.0.0:8000
    tty: true

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    container_name: secguard-frontend
    restart: on-failure
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:8000

volumes:
  postgres_db:
