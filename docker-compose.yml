services:
  db:
    image: postgres:17.6
    ports:
      - "5433:5432"
    volumes:
      - postgres_db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=blt_db
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "blt_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: secguard-db
    restart: always
    command: -c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=768MB

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    container_name: secguard-backend
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/secguard/statistics/overview"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/website:/blt/website:cached
      - ./backend/blt:/blt/blt:cached
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/blt_db
      - POSTGRES_PASSWORD=postgres
    command: poetry run gunicorn blt.wsgi:application \
      --workers 4 --threads 4 --bind 0.0.0.0:8000 \
      --timeout 120 --graceful-timeout 30 --keep-alive 5 \
      --max-requests 1000 --max-requests-jitter 50 \
      --worker-tmp-dir /dev/shm \
      --access-logfile - --error-logfile - --log-level info
    tty: true

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    container_name: secguard-frontend
    restart: on-failure
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:8000

volumes:
  postgres_db:
