services:
  db:
    image: postgres:17.6
    ports:
      - "5433:5432"
    volumes:
      - postgres_db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=blt_db
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "blt_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: secguard-db
    restart: always
    command: -c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=768MB

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    container_name: secguard-backend
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/secguard/statistics/overview"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/website:/blt/website:cached
      - ./backend/blt:/blt/blt:cached
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/blt_db
      - POSTGRES_PASSWORD=postgres
      - DEBUG=False
    command: bash -c "pip install --quiet -r /blt/requirements.txt --index-url https://mirrors.aliyun.com/pypi/simple/ --trusted-host mirrors.aliyun.com 2>&1 | tail -5 || true; python manage.py runserver 0.0.0.0:8000"
    tty: true

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    container_name: secguard-frontend
    restart: on-failure
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:8000

volumes:
  postgres_db:
